name: Publish

on:
  workflow_dispatch:
  push:
    branches: [ 'master' ]
    paths-ignore:
      - '.github/workflows/**'
      - 'README.md'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          # gitversion derives the version from tags + commit offset, so we need full history + tags.
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          # The build's Gradle daemon runs on this JDK; the project's Java 25 toolchain is auto-provisioned.
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and publish
        run: ./gradlew check publish --no-configuration-cache
        env:
          MAVEN_USER: ${{ secrets.MAVEN_USER }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
